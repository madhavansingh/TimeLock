[toolchain]
# Explicitly declare versions so `anchor build` does not attempt to run
# `solana-install` for a different release.  These must match what is on PATH.
anchor_version = "0.30.1"
solana_version = "1.18.17"

[features]
resolution = true
skip-lint = false

[programs.localnet]
legal_timelock = "EbKjjyvxck5REvVXTXuAvPDrydzKFniiGgLdKSeyfc3w"

[programs.devnet]
legal_timelock = "EbKjjyvxck5REvVXTXuAvPDrydzKFniiGgLdKSeyfc3w"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
