version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: timelock-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: timelock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d timelock"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: timelock-backend
    ports:
      - "5001:5001"
    environment:
      - PORT=${PORT:-5001}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/timelock?schema=public}
      - JWT_SECRET=${JWT_SECRET}
      - PINATA_API_KEY=${PINATA_API_KEY}
      - PINATA_SECRET=${PINATA_SECRET}
      - PINATA_JWT=${PINATA_JWT}
      - PINATA_GATEWAY=${PINATA_GATEWAY}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - SOLANA_RELAYER_PRIVATE_KEY=${SOLANA_RELAYER_PRIVATE_KEY}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
      - PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timelock-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5001/v1}
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
