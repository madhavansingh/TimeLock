version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: timelock-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: timelock
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d timelock"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: timelock-backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/timelock?schema=public
      - JWT_SECRET=ltn_hackathon_jwt_secret_2026_kleos_super_secure_key
      - PINATA_API_KEY=mock_pinata_api_key
      - PINATA_SECRET=mock_pinata_api_secret
      - PINATA_JWT=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..gyNDD3OkTU1w5QH3y7IjziMp7AFdmh3e4NBzbV7LOaw
      - PINATA_GATEWAY=silver-acceptable-bandicoot-606.mypinata.cloud
      - SOLANA_RPC_URL=https://api.devnet.solana.com
      - SOLANA_RELAYER_PRIVATE_KEY=[86,59,173,247,107,158,10,62,76,251,119,90,136,134,222,30,70,194,226,102,95,83,171,168,223,92,82,147,6,71,20,160,75,83,28,120,53,129,227,242,89,139,147,81,209,115,178,212,113,217,233,246,202,244,167,102,102,231,26,81,113,168,202,220]
      - CLIENT_URL=http://10.131.235.84:3000
      - PUBLIC_APP_URL=http://10.131.235.84:3000
      - FRONTEND_URL=http://10.131.235.84:3000
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timelock-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://10.131.235.84:5001/v1
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
